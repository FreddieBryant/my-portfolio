<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-portfolio</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://kit.fontawesome.com/053ba03e61.js" crossorigin="anonymous"></script>
  </head>
  <body class="grid-container">
    <header>
      <img src="images/logo.svg" alt="MERN Logo" class="logo" />
      <h1>MERN Stack Developer</h1>
      <nav>
        <ul class="nav-links">
          <li>
            <a href="#"><i class="fa-solid fa-house" aria-hidden="true"></i> Home</a>
          </li>

          <li>
            <a href="#"><i class="fa-solid fa-user" aria-hidden="true"></i> About me</a>
          </li>
          <li>
            <a href="#">Courses<i class="fa-solid fa-chevron-down" aria-hidden="true"></i></a>
            <ul class="nav_submenu">
              <li>HTML</li>
              <li>CSS</li>
              <li>JavaScript</li>
              <li>Git</li>
            </ul>
          </li>
          <li>
            <a href="#contact"
              ><i class="fa-solid fa-envelope" aria-hidden="true"></i> Contact me</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <aside>
      <h2>Bio</h2>
      <img
        src="images/new-bio-pic-150.jpg"
        srcset="images/new-bio-pic-150.jpg 1x, images/new-bio-pic-300.jpg 2x"
        alt="My profile photo"
        class="bio-photo"
      />

      <p>Self-taught developer</p>
    </aside>

    <main>
      <section id="contact">
        <h2>Contact Me</h2>
        <!-- 1. ADDED YOUR FORMSPREE ENDPOINT URL AND POST METHOD HERE -->
        <form id="contact-form" action="https://formspree.io/f/mojbabwp" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <!-- 2. ADDED name="name" -->
            <input id="name" name="name" type="text" placeholder="Your Name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <!-- 3. ADDED name="email" -->
            <input id="email" name="email" type="email" placeholder="email@example.com" required />
          </div>

          <div class="form-group">
            <label for="course-select">Interested Course</label>
            <select id="course-select" name="interested_course">
              <optgroup label="Front-end Courses">
                <option value="html" selected>HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
              </optgroup>
              <optgroup label="Back-end Courses">
                <option value="node">Node.js</option>
                <option value="express">Express</option>
                <option value="mongodb">MongoDB</option>
              </optgroup>
            </select>
          </div>

          <fieldset class="form-group">
            <legend>Project Type</legend>
            <div class="radio-group">
              <input
                type="radio"
                id="type-freelance"
                name="project_type"
                value="freelance"
                checked
              />
              <label for="type-freelance" class="inline-label">Freelance Contract</label>

              <input type="radio" id="type-fulltime" name="project_type" value="fulltime" />
              <label for="type-fulltime" class="inline-label">Full-Time Hire</label>
            </div>
          </fieldset>

          <fieldset class="form-group">
            <legend>Services Needed</legend>
            <div class="checkbox-group">
              <input type="checkbox" id="service-frontend" name="services" value="frontend" />
              <label for="service-frontend" class="inline-label">Frontend (React)</label>

              <input type="checkbox" id="service-backend" name="services" value="backend" />
              <label for="service-backend" class="inline-label">Backend (Node/Mongo)</label>
            </div>
          </fieldset>

          <div class="form-group">
            <label for="timeline">Expected Timeline (Weeks)</label>
            <input type="range" id="timeline" name="timeline" min="2" max="12" step="2" value="4" />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <!-- 4. ADDED name="message" -->
            <textarea
              id="message"
              name="message"
              rows="10"
              placeholder="Type your message here..."
              required
            ></textarea>
          </div>

          <button type="submit">Send Message</button>
        </form>
        <div id="form-status" class="success-message">
          <i class="fa-solid fa-circle-check"></i> Message sent successfully!
        </div>
      </section>
    </main>

    <footer>
      <div class="social-links">
        <a href="https://github.com" target="_blank" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>
      <p>&copy; 2026 MERN Stack Developer | Built with Passion</p>
    </footer>
  </body>
</html>
