<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-portfolio</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://kit.fontawesome.com/053ba03e61.js" crossorigin="anonymous"></script>
  </head>
  <body class="grid-container">
    <header>
      <img src="images/logo.svg" alt="MERN Logo" class="logo" />
      <h1>MERN Stack Developer</h1>
      <nav>
        <ul class="nav-links">
          <li>
            <a href="#"><i class="fa-solid fa-house" aria-hidden="true"></i> Home</a>
          </li>

          <li>
            <a href="#"><i class="fa-solid fa-user" aria-hidden="true"></i> About me</a>
          </li>
          <li>
            <a href="#">Courses<i class="fa-solid fa-chevron-down" aria-hidden="true"></i></a>
            <ul class="nav_submenu">
              <li>HTML</li>
              <li>CSS</li>
              <li>JavaScript</li>
              <li>Git</li>
            </ul>
          </li>
          <li>
            <a href="#contact"
              ><i class="fa-solid fa-envelope" aria-hidden="true"></i> Contact me</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <aside>
      <h2>Bio</h2>
      <img
        src="images/bio-pic-150.jpg"
        srcset="images/bio-pic-150.jpg 1x, images/bio-pic-300.jpg 2x"
        alt="My profile photo"
        class="bio-photo"
      />

      <p>Self-taught developer</p>
    </aside>

    <main>
      <section id="contact">
        <h2>Contact Me</h2>
        <form action="">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Your Name" />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="email@example.com" />
          </div>
          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>
    <footer>
      <div class="social-links">
        <a href="https://github.com" target="_blank" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>
      <p>&copy; 2026 MERN Stack Developer | Built with Passion</p>
    </footer>
  </body>
</html>
