<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-portfolio</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://kit.fontawesome.com/053ba03e61.js" crossorigin="anonymous"></script>
  </head>
  <body class="grid-container">
    <header>
      <img src="images/logo.svg" alt="MERN Logo" class="logo" />
      <h1>MERN Stack Developer</h1>
      <nav>
        <ul class="nav-links">
          <li>
            <a href="#"><i class="fa-solid fa-house" aria-hidden="true"></i> Home</a>
          </li>

          <li>
            <a href="#"><i class="fa-solid fa-user" aria-hidden="true"></i> About me</a>
          </li>
          <li>
            <a href="#">Courses<i class="fa-solid fa-chevron-down" aria-hidden="true"></i></a>
            <ul class="nav_submenu">
              <li>HTML</li>
              <li>CSS</li>
              <li>JavaScript</li>
              <li>Git</li>
            </ul>
          </li>
          <li>
            <a href="#contact"
              ><i class="fa-solid fa-envelope" aria-hidden="true"></i> Contact me</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <aside>
      <h2>Bio</h2>
      <img
        src="images/bio-pic-150.jpg"
        srcset="images/bio-pic-150.jpg 1x, images/bio-pic-300.jpg 2x"
        alt="My profile photo"
        class="bio-photo"
      />

      <p>Self-taught developer</p>
    </aside>

    <main>
      <section id="contact">
        <h2>Contact Me</h2>
        <form id="contact-form" action="">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="Your Name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="email@example.com" required />
          </div>
          <!-- Inside the form in index.html, below the Email div -->
          <div class="form-group">
            <label for="course-select">Interested Course</label>
            <select id="course-select" name="interested_course">
              <optgroup label="Front-end Courses">
                <option value="html" selected>HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
              </optgroup>
              <optgroup label="Back-end Courses">
                <option value="node">Node.js</option>
                <option value="express">Express</option>
                <option value="mongodb">MongoDB</option>
              </optgroup>
            </select>
          </div>

          <!-- FIXED: Message wrapped inside form-group container -->
          <div class="form-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              rows="10"
              placeholder="Type your message here..."
              required
            ></textarea>
          </div>
          <!-- FIXED: Button moved down below the textarea box -->
          <button type="submit">Send Message</button>
        </form>
        <div id="form-status" class="success-message">
          <i class="fa-solid fa-circle-check"></i> Message sent successfully!
        </div>
      </section>
    </main>

    <footer>
      <div class="social-links">
        <a href="https://github.com" target="_blank" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>
      <p>&copy; 2026 MERN Stack Developer | Built with Passion</p>
    </footer>
  </body>
</html>
